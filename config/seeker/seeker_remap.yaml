%YAML:1.0
---
# 由 gen_seeker_config.py 生成，供 seeker_split_node 构建重映射表
# 双目对: front  = 物理鱼眼 0(left) + 1(right)
#
# src_index    该虚拟相机取自 /all/compressed 的第几路（垂直堆叠的切片号）
# mei_*        物理鱼眼的 omni 标定（原始 1088x1280 分辨率下的值）
# R_phys_virt  虚拟针孔系 -> 物理鱼眼系 的旋转（列主序 3x3）
#              光心相同，所以只需旋转，与深度无关
# decode_scale JPEG 解码时的降采样比例；节点会据此缩放 mei 内参

virt_width: 640
virt_height: 480
virt_fx: 320.0
virt_fy: 320.0
virt_cx: 320.0
virt_cy: 240.0
decode_scale: 1.0

cam0:
   src_index: 0
   src_width: 1088
   src_height: 1280
   mei_xi: 3.222688207729
   mei_fx: 1662.109291268864
   mei_fy: 1661.007968514089
   mei_cx: 544.465274758119
   mei_cy: 606.185708369130
   mei_k1: -0.086936617614
   mei_k2: 0.617350869618
   mei_p1: -0.002491262175
   mei_p2: -0.003998087333
   R_phys_virt: !!opencv-matrix
      rows: 3
      cols: 3
      dt: d
      data: [
             0.715337983197, 0.000543815543, 0.698778415566,
             -0.000389011971, 0.999999852132, -0.000380006619,
             -0.698778518893, -0.000000000000, 0.715338088972 ]

cam1:
   src_index: 1
   src_width: 1088
   src_height: 1280
   mei_xi: 3.177578050278
   mei_fx: 1641.811598992280
   mei_fy: 1641.584682346974
   mei_cx: 543.021922029999
   mei_cy: 631.245037627147
   mei_k1: -0.100125753156
   mei_k2: 0.579523156522
   mei_p1: -0.002878523476
   mei_p2: 0.001968264039
   R_phys_virt: !!opencv-matrix
      rows: 3
      cols: 3
      dt: d
      data: [
             0.699837981705, 0.001774976757, -0.714299411186,
             -0.011690464147, 0.999891437953, -0.008969133492,

%YAML:1.0

# =============================================================================
#  seeker1 四目鱼眼环视相机 · 矫正双目 + IMU · VINS-Fusion (ROS2 Humble)
#
#  本文件由 scripts/gen_seeker_config.py 生成，标定读自设备，不是估计值。
#
#  数据链路:
#    seeker 驱动 --/all/compressed(JPEG,四路堆叠)--> seeker_split_node
#      节点内: 解码 -> 切片 -> 鱼眼去畸变(预计算 remap) -> 发 /cam0 /cam1
#    为什么要中间这一层:
#      驱动的 /fisheye/*/image_raw 是 bgr8 1088x1280，单帧 4.18MB，
#      DDS 传这种大消息实测只有 2.2~8.0Hz；走压缩流本地拆分可跑满 20Hz。
#
#  相机: front 矫正双目 = 物理鱼眼 0(left) + 1(right)
#  基线: 4.61 cm
#  模型: PINHOLE 零畸变（去畸变后的虚拟相机）
#        不能用 MEI —— 出厂 xi=3.22>1，
#        VINS 的 CataCamera 反投影会开负数根输出 NaN
#  视场: 90.0° x 73.7°  (640x480, f=320)
# =============================================================================

imu: 1
num_of_cam: 2

imu_topic: "/imu_data_raw"
image0_topic: "/cam0/image_raw"
image1_topic: "/cam1/image_raw"
output_path: "/root/output/"

cam0_calib: "cam0_pinhole.yaml"
cam1_calib: "cam1_pinhole.yaml"
image_width: 640
image_height: 480

use_gpu         : 0
use_gpu_acc_flow: 0
use_gpu_ceres   : 0

# -----------------------------------------------------------------------------
# 外参: body(IMU) <- 虚拟相机
#   由厂家鱼眼标定的 T_cam_imu 经矫正旋转推出，已与厂家
#   3_get_undistort_kalibr_info.py 的输出逐项比对一致，所以设 0 完全信任。
# -----------------------------------------------------------------------------
estimate_extrinsic: 0

body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [
          0.9998332207, -0.0157893109, -0.0091776105, -0.0221978526,
          0.0092194851, 0.0025813457, 0.9999541678, 0.0267707244,
          -0.0157648966, -0.9998720090, 0.0027264845, -0.0034748300,
          0.0000000000, 0.0000000000, 0.0000000000, 1.0000000000 ]

body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [
          0.9998332207, -0.0157893109, -0.0091776105, 0.0238593394,
          0.0092194851, 0.0025813457, 0.9999541678, 0.0271954188,
          -0.0157648966, -0.9998720090, 0.0027264845, -0.0042010380,
          0.0000000000, 0.0000000000, 0.0000000000, 1.0000000000 ]


multiple_thread: 1

# max_cnt 提到 250: 实测 feat 长期是 145~147/150，一直顶着上限跑，
# 说明画面里还有可用特征没提。min_dist=30 时 640x480 理论可放约 340 个点。
# 官方 EuRoC 用 150 是针对 752x480、视场更窄的场景；本机视场 90°x74° 更宽。
max_cnt: 250
min_dist: 30            # 与官方 EuRoC 一致
freq: 10
F_threshold: 1.0
show_track: 1
flow_back: 1

# -----------------------------------------------------------------------------
# 求解器预算必须远大于上游默认，否则优化器每帧都「没算完就被叫停」
#
# 上游默认 max_num_iterations: 8 / max_solver_time: 0.04 是给 EuRoC 那种
# 小问题用的。本机实测(相机静置，四目鱼眼矫正双目 + IMU):
#     8 次迭代:  47% 的帧撞上迭代上限，单帧代价只降 0.3%
#                (2.766801e+05 -> 2.758939e+05)，代价常年停在 2.8e5 量级
#     30 次迭代: 未收敛降到 5~6%，单帧代价降 68%
#                (2.79e4 -> 8.92e3)，代价量级降到 4e3 —— 低了两个数量级
# 也就是说默认配置下 VINS 根本没在解这个问题，只是每帧擦个边，
# 状态跟不上、误差累积，最终失控。
#
# 算力是有富余的: 30 次迭代实测 solver 平均 27.8ms，
# 而 freq: 10 意味着每帧有 100ms 预算。
# -----------------------------------------------------------------------------
max_solver_time: 0.06
max_num_iterations: 30

# -----------------------------------------------------------------------------
# keyframe_parallax 保持上游默认 10.0
#
# 曾经调到 0.3 来缓解「静止时滑窗停滞」，但那是治标: 静止的根治手段是
# patches/0001(预积分超时强制关键帧)，已经覆盖了这个场景。
# 而调小的代价在运动时才暴露: 每帧都成为关键帧 -> 滑窗只覆盖约 1 秒 ->
# 时间基线过短，本机双目基线又只有 4.6cm，远处特征三角化会明显变差。
# 运动才是这套系统的主要工况，所以这里回到上游值。
# -----------------------------------------------------------------------------
keyframe_parallax: 10.0

# -----------------------------------------------------------------------------
# 零速修正(ZUPT) —— 默认开启
#
# 静止时把速度约束为零。实测(同一段 5 分钟数据回放 3 次)静止漂移:
#     use_zupt: 0    3.37 / 3.33 / 3.59 cm
#     use_zupt: 1    1.53 / 1.65 / 1.48 cm     <- 减半
#
# 它的风险是「运动中被误判为静止」会把位置冻住，比少修正一点漂移严重得多。
# 所以静止判据做得很保守:
#   * 用【标准差】而非原始读数(陀螺静止时读数就是零偏 0.028 rad/s，
#     加速度计静止时读数是重力，对模长设阈值必然误判)
#   * 阈值取实测静置噪声的约 10 倍(accel 0.006->0.06, gyro 0.0006->0.008)
#   * 另加比力模长偏离 g 超 0.5 的判据，防匀加速运动漏判
#   * 迟滞: 连续 10 个图像区间(约 1 秒)才【进入】静止态，
#     但只要有 1 个区间判定为运动就【立刻退出】—— 进入慢、退出快
#
# ⚠ 尚未在运动工况下验证。若出现「缓慢平稳移动时轨迹卡住不动」，
#   第一嫌疑就是这里，设 use_zupt: 0 即可关闭。
# -----------------------------------------------------------------------------
use_zupt: 1

# 失效检测 —— 默认关闭。上游把 failureDetection() 整个废掉了(第一行 return false)，
# 本项目补丁恢复了它，但实测 clearState() 的恢复路径不可靠，阈值稍紧还会在
# 正常运动中误触发、把好的估计重置掉。需要时再设 1。
use_failure_detection: 1

# -----------------------------------------------------------------------------
# IMU 噪声 —— allan_variance_ros(ori-drs) 官方拟合器标定，21.3 分钟静置数据
#
# VINS 论文要求 IMU 噪声【逐设备】标定。抄 EuRoC 数据集里 ADIS16448 的参数
# (0.1/0.01/0.001/0.0001)与本机实测差两个数量级，是错的。
# 标定流程见 scripts/calib_imu_allan.py(用 ROS2 采数据 + 上游 analysis.py 拟合)。
#
# 官方拟合器输出(取三轴最差):
#     Velocity Random Walk  0.00096 m/s/sqrt(s)      -> acc_n
#     Angle Random Walk     0.00011 deg/sqrt(s)      -> gyr_n  (= 1.92e-6 rad)
#     Accel Random Walk     0.00017 m/s^2/sqrt(s)    -> acc_w
#     Rate Random Walk      0.00001 deg/s/sqrt(s)    -> gyr_w  (= 1.75e-7 rad)
#
# 安全系数: 白噪声 x5、随机游走 x10。这是 allan_variance_ros 与 Kalibr 文档
# 都建议的做法 —— 静置标定会低估实际工况(振动、温漂)。随机游走系数更大是因为
# 本机热漂明显: 实测重力模长在 21 分钟内从 10.006 漂到 9.995，
# 零偏必须有足够自由度追上它。
#
# 实测(回放同一段 5 分钟数据，各 3~4 次): 标定原值、标定x5、更早的经验值
# 三者都能稳定收敛，漂移 2.0~4.9 cm，其中标定x5 为 2.05~2.94 cm。
# -----------------------------------------------------------------------------
#   ⚠ 安全系数取 x25 而非文档建议的 x5，是【尚未定论的折中】:
#     静止回放实测(每组 3 次)  漂移(m)              自愈次数
#         x5   (文档建议)      0.020/0.027/0.029    13/1/0
#         x25  (当前)          0.034/0.034/0.036     2/1/0
#         x50                  0.043/0.026/0.038     0/13/0
#     静止时 x5 漂移最小，但实时晃动测试中 x5 触发了 43~48 次自愈重置
#     (静止时只有 0~1 次) —— 运动时噪声设太小，IMU 因子过"刚"，数值上撑不住。
#     运动工况的闭环误差尚未量化，定论前先取折中值。
#     待有运动数据后按闭环误差重新确定。
acc_n: 0.0240
gyr_n: 0.0000480
acc_w: 0.0017
gyr_w: 0.00000175

# -----------------------------------------------------------------------------
# g_norm 用【本机实测的静置重力模长】，不是标准重力值
#
# 实测静置 |a| = 10.0007，比当地真实重力(约 9.79)高 2.05% —— 这是加速度计的
# 标度/零偏误差。按标准值填的话这个差就成了恒定残差全压给 Ba，
# 而 VINS 状态量里只有零偏、不建模标度因子。
#
# 注意: 这个值还会随温度漂(实测 21 分钟内 10.006 -> 9.995)，所以补丁 0003 里
# initFirstIMUPose() 会在【每次初始化时】用当时实测的模长覆盖这里的值。
# 这里填的只是一个合理的兜底初值。
# -----------------------------------------------------------------------------
g_norm: 10.0007

# -----------------------------------------------------------------------------
# estimate_td 必须关掉，开着会死锁 —— 这是本机实测踩过的最严重的坑
#
# td 是相机与 IMU 的时间偏移，它只有在【有运动】时才可观测：时间偏移造成的
# 特征位移正比于运动速度，静止时该项恒为 0，td 完全不可观。于是优化器可以
# 随意推动 td 去吸收别的误差。实测相机静置桌面时 td 的演化：
#     0.000 -> 0.463 -> 0.926 -> 1.387 -> 140.885 -> 558.826 秒
# 一旦 td 变大，VINS 内部 curTime = 图像时间 + td 就会远远领先 IMU 流，
# IMUAvailable() 永远返回 false，估计器卡死在 "wait for imu"（实测刷了 4.7 万次），
# 同时位置在死锁前已被打飞到千米量级。
#
# 关掉是安全的：厂家标定给出 timeshift_cam_imu = 0.0，且驱动的图像与 IMU
# 时间戳来自设备同一时钟(实测两者 dt 都干净、无重复无倒退)。
# 若将来确认存在固定偏移，直接把测得的值写进下面的 td，仍然保持 estimate_td: 0。
# -----------------------------------------------------------------------------
estimate_td: 0
td: 0.0

load_previous_pose_graph: 0
pose_graph_save_path: "/root/output/pose_graph/"
save_image: 0

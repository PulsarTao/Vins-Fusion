%YAML:1.0

# =============================================================================
#  Intel RealSense D435i  ·  红外双目 + IMU  ·  VINS-Fusion (ROS2 Humble)
#
#  ⚠ 首次使用请务必运行标定生成脚本，用你自己这台相机的出厂参数替换本文件的默认值：
#      python3 /ros2_ws/scripts/gen_d435i_config.py --out /ros2_ws/vins_config/d435i
#    每台 D435i 的内参和 IMU-相机外参都不同，照抄会明显掉精度甚至发散。
# =============================================================================

#common parameters
imu: 1
num_of_cam: 2

imu_topic: "/camera/camera/imu"
image0_topic: "/camera/camera/infra1/image_rect_raw"
image1_topic: "/camera/camera/infra2/image_rect_raw"
output_path: "/root/output/"

cam0_calib: "left.yaml"
cam1_calib: "right.yaml"
image_width: 848
image_height: 480

# GPU 加速（本移植版支持；通用 arm64 镜像里为 0，Jetson 变体可开启）
use_gpu         : 0
use_gpu_acc_flow: 0
use_gpu_ceres   : 0

# -----------------------------------------------------------------------------
# 外参：IMU ← 相机
#   1 = 有初值，在线优化（默认，安全）
#   0 = 精确已知，完全信任下面的矩阵（跑过 gen_d435i_config.py 后推荐改成 0，精度更好）
# -----------------------------------------------------------------------------
estimate_extrinsic: 1

# 下面是 D435i 的标称值（IMU 在左红外相机附近，光学系 z 前 x 右 y 下）。
# 仅作为在线优化的初值，请用 gen_d435i_config.py 生成的真值替换。
body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ 1.0, 0.0, 0.0,  0.00552,
           0.0, 1.0, 0.0,  0.00510,
           0.0, 0.0, 1.0,  0.01174,
           0.0, 0.0, 0.0,  1.0 ]

# cam1 = cam0 沿基线平移 50mm（D435i 红外双目标称基线）
body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [ 1.0, 0.0, 0.0,  0.05552,
           0.0, 1.0, 0.0,  0.00510,
           0.0, 0.0, 1.0,  0.01174,
           0.0, 0.0, 0.0,  1.0 ]

#Multiple thread support
multiple_thread: 1

# -----------------------------------------------------------------------------
# 前端特征跟踪
#   嵌入式平台算力有限，max_cnt 是最影响 CPU 占用的参数：
#     Jetson AGX Orin : 150（默认）
#     RDK X5          : 120
#     树莓派 5        : 100 甚至 80，并考虑把图像降到 424x240
# -----------------------------------------------------------------------------
max_cnt: 150
min_dist: 25
freq: 10
F_threshold: 1.0
show_track: 0          # 板子上关掉可视化省 CPU；调试时可临时开
flow_back: 1

# -----------------------------------------------------------------------------
# 后端优化
#   max_solver_time 是实时性与精度的权衡；跟不上（日志报 solver time 超限）就调大，
#   但超过 1/图像帧率 就会开始丢帧。
# -----------------------------------------------------------------------------
max_solver_time: 0.04
max_num_iterations: 8
keyframe_parallax: 10.0

# -----------------------------------------------------------------------------
# IMU 噪声参数（D435i 的 BMI055 实测经验值）
#   宁可设大一些：设得过小会让优化器过度信任 IMU，机动时容易发散。
#   想精确标定可用 imu_utils / allan_variance_ros 跑 2 小时静置数据。
# -----------------------------------------------------------------------------
acc_n: 0.1          # 加速度计测量噪声标准差
gyr_n: 0.01         # 陀螺仪测量噪声标准差
acc_w: 0.001        # 加速度计 bias 随机游走
gyr_w: 0.0001       # 陀螺仪 bias 随机游走
g_norm: 9.805       # 当地重力加速度（北京约 9.801，广州约 9.788，可按纬度微调）

# -----------------------------------------------------------------------------
# 时间同步
#   D435i 的图像与 IMU 走同一条 USB、共用硬件时钟，但驱动仍可能有固定偏移。
#   estimate_td: 1 让 VINS 在线估计该偏移 —— 真机上强烈建议打开。
# -----------------------------------------------------------------------------
estimate_td: 1
td: 0.0

#loop closure parameters
load_previous_pose_graph: 0
pose_graph_save_path: "/root/output/pose_graph/"
save_image: 0          # 板子上存图很吃 IO 和存储，默认关闭
